<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Admin Panel - Addis School</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="user.css">
</head>

<body>
    <h2>User Admin Panel</h2>

    <!-- Role Management Section -->
    <h3>Update User Role</h3>
    <label>User ID:</label>
    <input type="text" id="userId" placeholder="Paste user UUID here">

    <label>Role:</label>
    <select id="roleSelect">
        <option value="parent">Parent</option>
        <option value="admin">Admin</option>
    </select>

    <button id="updateRoleBtn">Update Role</button>

    <div id="message" style="display:none; padding: 10px; margin: 10px 0; border-radius: 6px; background: #f8f9fa;"></div>

    <hr>

    <h3>All Users</h3>
    <button id="loadUsersBtn">🔄 Refresh Users</button>

    <div id="userList"></div>

    <hr>

    <p style="color:#888; font-size:0.85rem;">
        <strong>Note:</strong> To delete a user, click "Delete Account" on any user card above.
        This will permanently remove the user and all associated data (profiles, watch history, likes, etc.).
    </p>

    <script src="./user.js"></script>
</body>

</html>
