<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart TV Focus Navigation with Bishop.js</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Roboto, sans-serif;
            background: #111;
            color: #fff;
        }

        nav.flex-div {
            display: flex;
            padding: 10px;
            background: #222;
        }

        nav .navigable {
            margin: 0 10px;
            padding: 8px;
            cursor: pointer;
        }

        .sidebar,
        .user-sidebar {
            position: absolute;
            top: 50px;
            left: 0;
            bottom: 0;
            width: 250px;
            background: #333;
            overflow-y: auto;
            display: none;
        }

        .sidebar.open,
        .user-sidebar.open {
            display: block;
        }

        .list-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            grid-gap: 10px;
            padding: 10px;
        }

        .navigable:focus,
        .focused {
            outline: 2px solid yellow;
            background: rgba(255, 255, 0, 0.1);
        }

        .video-box {
            height: 300px;
            background: #444;
            display: flex;
            align-navigables: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- GREY BOXES NAVIGATION -->
    <nav class="flex-div zone" data-zone="nav">
        <div class="nav-left flex-div">
            <img class="menu-icon navigable bishop-navigable" tabindex="0" data-zone-trigger="sidebar" src="menu.png"
                alt="Menu">
            <img class="logo navigable bishop-navigable" tabindex="0" src="logo.png" alt="Logo">
        </div>
        <div class="nav-middle flex-div">
            <div class="sliding-text" style="display:none;">Banner Text</div>
            <div class="search-box flex-div">
                <input type="text" id="searchBar" placeholder="Search" />
                <img class="search navigable bishop-navigable" tabindex="0" src="search.png" alt="Search">
            </div>
        </div>
        <div class="nav-right flex-div">
            <button class="join-us navigable bishop-navigable" tabindex="0">Join Us!</button>
            <img id="userIcon" class="userIcon navigable bishop-navigable" tabindex="0" data-zone-trigger="user-sidebar"
                src="user.png" alt="User Icon">
        </div>
    </nav>

    <!-- SIDE BARS -->
    <div class="sidebar zone" data-zone="sidebar">
        <div class="navigable bishop-navigable" tabindex="0">Menu navigable 1</div>
        <div class="navigable bishop-navigable" tabindex="0">Menu navigable 2</div>
    </div>
    <div class="user-sidebar zone" data-zone="user-sidebar">
        <div class="navigable bishop-navigable" tabindex="0">Profile</div>
        <div class="navigable bishop-navigable" tabindex="0">Settings</div>
        <div class="navigable bishop-navigable" tabindex="0">Logout</div>
    </div>

    <!-- GRID -->
    <div class="list-container zone" data-zone="main">
        <!-- 49 boxes added via JS -->
    </div>

    <!-- Bishop.js library -->
    <script src="../scripts/services/bishop.js"></script>
    <script>
        bishop.init();
        bishop.focus(document.querySelector('.navigable')); // or your initial focusable element
    </script>
</body>

</html>
